name: Keep Alive Render

on:
  schedule:
    - cron: '*/5 * * * *' # Ping every 5 minutes to account for GitHub Actions schedule delay
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        run: |
          curl -s https://real-time-fraud-detection-platform-oxg6.onrender.com/health
          echo "Pinged Render service at $(date)"
