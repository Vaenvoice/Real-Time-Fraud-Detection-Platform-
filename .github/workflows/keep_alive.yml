name: Keep Alive Render

on:
  schedule:
    - cron: '*/12 * * * *' # Runs every 12 minutes
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        run: |
          curl -s https://real-time-fraud-detection-platform.onrender.com/health
          echo "Pinged Render service at $(date)"
